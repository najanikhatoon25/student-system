<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Student</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="card">

        <h1 id="heading">Search Student</h1>

        <form action="/search" method="POST">

            <input
                type="number"
                name="student_id"
                placeholder="Enter Student ID"
                required>

            <button type="submit" class="btn">
                Search
            </button>

        </form>

        <br>

        {% if student %}

        <h3>Student Details</h3>

        <p><b>ID :</b> {{ student[0] }}</p>
        <p><b>Name :</b> {{ student[1] }}</p>
        <p><b>Email :</b> {{ student[2] }}</p>
        <p><b>Age :</b> {{ student[3] }}</p>
        <p><b>Gender :</b> {{ student[4] }}</p>
        <p><b>Course :</b> {{ student[5] }}</p>

        {% endif %}

        {% if message %}

        <h3 style="color:red;">
            {{ message }}
        </h3>

        {% endif %}

    </div>

</body>

</html>
